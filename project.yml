name: FiddleTunes
options:
  bundleIdPrefix: com.iancurry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  FiddleTunes:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FiddleTunes
        excludes:
          - Resources/**
    resources:
      - path: FiddleTunes/Resources
    info:
      path: FiddleTunes/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "FiddleTunes needs microphone access to record your fiddle playing."
        UIBackgroundModes:
          - remote-notification
        UIAppFonts:
          - NotoSerif-Regular.ttf
          - NotoSerif-Bold.ttf
          - NotoSerif-Italic.ttf
          - Manrope-VariableFont_wght.ttf
          - "MaterialSymbolsOutlined[FILL,GRAD,opsz,wght].ttf"
    settings:
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
      DEVELOPMENT_TEAM: ""  # user fills in
      CODE_SIGN_ENTITLEMENTS: FiddleTunes/FiddleTunes.entitlements
    dependencies:
      - sdk: CloudKit.framework
      - sdk: AVFoundation.framework

  FiddleTunesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FiddleTunesTests
    dependencies:
      - target: FiddleTunes
    settings:
      SWIFT_VERSION: "5.9"
